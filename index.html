<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal Chat — Live Network</title>
<meta name="description" content="Realtime multi-channel chat with GIF search, custom password-protected rooms, and themeable UI." />

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Lucide Icons -->
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

<!-- Firebase (compat build for plain script usage) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  :root{
    /* Theme tokens — overridden by JS theme switcher */
    --bg:            #0a0d16;   /* main panel bg */
    --bg-deep:       #070a11;   /* sidebar/header/footer bg */
    --bg-elev:       #0d1222;   /* inputs / cards */
    --bg-elev2:      #0e1627;   /* secondary cards */
    --border:        rgba(255,255,255,.06);
    --border-2:      rgba(255,255,255,.10);
    --text:          #e2e8f0;
    --text-dim:      #94a3b8;
    --text-mute:     #64748b;
    --accent:        #00e5b0;   /* primary accent */
    --accent-ink:    #05131b;   /* text on accent */
    --accent-soft:   rgba(0,229,176,.16);
    --accent-glow:   rgba(0,229,176,.20);
    --scheme:        dark;
  }

  html, body { height:100%; }
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 60%),
      var(--bg-deep);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .font-mono{ font-family:'JetBrains Mono',monospace; }

  /* Scrollbars */
  .scrollbar-thin::-webkit-scrollbar{ width:6px; height:6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb{ background:var(--border-2); border-radius:99px; }
  .scrollbar-none::-webkit-scrollbar{ display:none; }
  .scrollbar-none{ -ms-overflow-style:none; scrollbar-width:none; }

  /* Animations */
  @keyframes fade-in{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  .animate-fade-in{ animation:fade-in .18s ease-out; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-5px);} 40%,80%{transform:translateX(5px);} }
  .animate-shake{ animation:shake .4s ease-in-out; }
  @keyframes pop-in{ from{opacity:0; transform:scale(.94);} to{opacity:1; transform:scale(1);} }
  .animate-pop{ animation:pop-in .16s ease-out; }

  /* theme-aware helpers */
  .surface       { background:var(--bg); }
  .surface-deep  { background:var(--bg-deep); }
  .surface-elev  { background:var(--bg-elev); }
  .surface-elev2 { background:var(--bg-elev2); }
  .bd            { border-color:var(--border); }
  .bd2           { border-color:var(--border-2); }
  .txt           { color:var(--text); }
  .txt-dim       { color:var(--text-dim); }
  .txt-mute      { color:var(--text-mute); }
  .accent        { color:var(--accent); }
  .accent-bg     { background:var(--accent); color:var(--accent-ink); }
  .accent-bd     { border-color:color-mix(in srgb, var(--accent) 45%, transparent); }

  ::selection{ background:var(--accent-soft); }

  /* Light scheme readability tweaks */
  [data-scheme="light"] .msg-text{ color:#1f2733; }
  [data-scheme="light"] .placeholder-mute::placeholder{ color:#94a3b8; }
</style>
</head>

<body>
<div id="chat-root" class="fixed inset-0 md:inset-6 lg:inset-10">

    <!-- ============ LEFT SIDEBAR: CHANNEL RAIL ============ -->

      <div class="flex flex-col items-center gap-0.5">
        <div class="w-2.5 h-2.5 rounded-full animate-pulse" style="background:var(--accent)" title="Portal Chat Live Network"></div>
        <span class="text-[7px] font-black font-mono tracking-widest accent">LIVE</span>
      </div>

      <nav id="channel-rail" class="flex-1 flex flex-col gap-1.5 w-full px-1 items-center justify-start pt-2 overflow-y-auto scrollbar-none"></nav>

      <button id="add-channel-rail"
        class="w-9 h-9 flex items-center justify-center rounded-xl transition-all border border-dashed border-white/20 hover:accent-bd txt-mute hover:accent hover:bg-white/5 cursor-pointer shrink-0"
        title="Create Custom Channel">
        <i data-lucide="plus" class="w-4 h-4"></i>
      </button>

      <!-- Moderation menu -->
      <button id="moderation-trigger"
        class="w-9 h-9 flex items-center justify-center rounded-xl transition-all txt-mute hover:accent hover:bg-white/5 cursor-pointer shrink-0"
        title="Moderation Settings">
        <i data-lucide="shield" class="w-4 h-4"></i>
      </button>

      <!-- Theme trigger -->
      <button id="theme-trigger"
        class="w-9 h-9 flex items-center justify-center rounded-xl transition-all txt-mute hover:accent hover:bg-white/5 cursor-pointer shrink-0"

        <i data-lucide="palette" class="w-4 h-4"></i>

    <!-- ============ MAIN PANEL ============ -->

      <!-- HEADER -->

        <div class="flex items-center gap-1.5 min-w-0">
          <span class="txt-mute font-extrabold text-[11px] hidden md:inline">#</span>
          <h1 id="active-channel-name" class="text-[11px] font-black txt tracking-tight flex items-center gap-1 uppercase truncate"></h1>
          <div class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse shrink-0"></div>
        </div>

        <div class="hidden sm:flex items-center gap-1.5 shrink-0">
          <div id="name-wrap" class="flex items-center gap-1 surface-elev border bd rounded-lg px-2 py-1 transition-all">
            <i data-lucide="user" class="w-3 h-3 txt-mute shrink-0"></i>
            <input id="nickname-desktop" type="text" placeholder="Set Nickname" maxlength="16"
              class="bg-transparent text-[11px] font-extrabold txt outline-none w-20 md:w-24 placeholder-mute" />
          </div>
          <div class="flex items-center gap-1 surface-elev border bd rounded-lg px-2 py-1">
            <i data-lucide="search" class="w-3 h-3 txt-mute shrink-0"></i>
            <input id="filter-input" type="text" placeholder="Filter…"

          </div>
        </div>

        <div class="flex items-center gap-1 shrink-0">
          <select id="channel-select"
            class="md:hidden surface-elev border bd py-1 px-1.5 rounded text-[10px] font-bold uppercase outline-none accent max-w-[110px]"></select>
          <button id="theme-trigger-mobile" class="md:hidden p-1.5 hover:bg-white/10 txt-dim rounded transition-all cursor-pointer" title="Theme">
            <i data-lucide="palette" class="w-4 h-4"></i>
          </button>
        </div>
      </header>

      <!-- MOBILE NICK ROW -->
      <div class="flex md:hidden items-center justify-between p-1.5 px-3 border-b bd surface-elev2 shrink-0">
        <span class="text-[9px] uppercase font-black txt-mute tracking-wider">Nick:</span>
        <input id="nickname-mobile" type="text" placeholder="anonymous" maxlength="16"
          class="surface-deep text-[11px] px-2 py-1 rounded outline-none border bd focus:accent-bd text-right max-w-[120px] font-extrabold txt placeholder-mute" />
      </div>

      <!-- UNLOCK GATE -->

        <div class="w-16 h-16 rounded-full bg-amber-500/10 flex items-center justify-center mb-4 border border-amber-500/20">
          <i data-lucide="lock" class="w-7 h-7 text-amber-500 animate-pulse"></i>
        </div>
        <h2 class="text-sm font-black uppercase txt tracking-wider"><span id="gate-name"></span></h2>
        <p id="gate-desc" class="txt-dim text-[11px] mt-1 max-w-xs leading-relaxed"></p>

        <div id="theme-dots" class="flex items-center gap-2 surface-deep border bd rounded-full px-3 py-2 self-start"></div>

        <div id="theme-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-2.5"></div>

    </div>

    <!-- ============ MODERATION MODAL ============ -->
    <div id="moderation-modal" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center p-4 z-[70] animate-fade-in backdrop-blur-sm">
      <div class="surface border bd2 rounded-2xl w-full max-w-md p-5 shadow-2xl flex flex-col gap-4 text-left animate-pop max-h-[80vh] overflow-y-auto scrollbar-thin">
        <div class="flex items-center justify-between border-b bd pb-2.5 sticky top-0 bg-inherit">
          <h2 class="text-xs font-black uppercase accent tracking-wider flex items-center gap-1.5">

            <i data-lucide="x" class="w-3.5 h-3.5"></i>

        </div>

        <div class="space-y-3.5">

          <div class="space-y-2">
            <h3 class="text-[10px] font-black uppercase tracking-wider txt-dim flex items-center gap-1.5">

              <button type="submit" class="accent-bg text-[10px] font-bold px-2.5 py-1.5 rounded-lg active:scale-95 transition-all cursor-pointer">Add</button>
            </form>

            <!-- Blocked words list -->
            <div id="blocked-words-list" class="space-y-1 max-h-[200px] overflow-y-auto scrollbar-thin">

            </div>

            <!-- Stats -->
            <div class="text-[9px] txt-mute pt-2 border-t bd">
              <span id="blocked-count">0</span> words blocked
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

function getBlockedWords(){
  return state_blockedWords.list || [];
}

function addBlockedWord(word){
  const clean = word.trim().toLowerCase();
  if(!clean){ toast('Word cannot be empty'); return false; }
  if(clean.length > 30){ toast('Word too long (max 30 chars)'); return false; }
  if(state_blockedWords.list.includes(clean)){ toast('Word already blocked'); return false; }
  state_blockedWords.list.push(clean);
  localStorage.setItem('blocked_words_list', JSON.stringify(state_blockedWords.list));
  renderBlockedWordsList();
  return true;
}

function removeBlockedWord(word){
  state_blockedWords.list = state_blockedWords.list.filter(w => w !== word);
  localStorage.setItem('blocked_words_list', JSON.stringify(state_blockedWords.list));
  renderBlockedWordsList();
}

function isBlocked(text){
  const low = (text || '').toLowerCase();
  return getBlockedWords().some(w => w && low.includes(w));
}

function renderBlockedWordsList(){
  const list = $('blocked-words-list');
  const words = getBlockedWords();
  
  if(words.length === 0){
    list.innerHTML = '<p class="text-[9px] txt-mute italic py-2">No blocked words yet</p>';
  } else {
    list.innerHTML = words.map(w => `
      <div class="flex items-center justify-between gap-2 surface-elev border bd rounded-lg p-1.5 animate-fade-in">
        <div class="flex-1">
          <code class="text-[9px] font-mono accent">${esc(w)}</code>
        </div>
        <button data-word="${esc(w)}" class="remove-word-btn p-1 txt-dim hover:txt hover:bg-rose-500/10 rounded transition-all cursor-pointer" title="Remove">
          <i data-lucide="trash-2" class="w-3 h-3"></i>
        </button>
      </div>
    `).join('');
    
    list.querySelectorAll('.remove-word-btn').forEach(btn => {
      btn.addEventListener('click', () => removeBlockedWord(btn.dataset.word));
    });
  }
  
  $('blocked-count').textContent = words.length;
  refreshIcons();
}

  }
};
const THEME_ORDER = ['midnight','slate','ocean','emerald','sunset','lavender','light','amoled'];

/* ---------- State ---------- */
const state = {
  activeChannel: CHANNELS[0],
  messages: [],
  chatName: localStorage.getItem('chat_name') || '',
  mediaUrl: '',
  searchFilter: '',
  gifOpen: false,
  customChannels: [],
  localChannels: safeParse('local_custom_channels', []),
  unlocked: safeParse('unlocked_chat_channels', {}),
  theme: localStorage.getItem('chat_theme') || 'midnight',
  listenerRef: null
};

function safeParse(key, fallback){ try{ const s=localStorage.getItem(key); return s?JSON.parse(s):fallback; }catch(e){ return fallback; } }

/* ---------- Helpers ---------- */
const $ = (id) => document.getElementById(id);
const esc = (s) => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function allChannels(){
  return [
    ...CHANNELS,
    ...state.localChannels,
    ...state.customChannels.filter(c => !state.localChannels.some(lc => lc.id===c.id || lc.name===c.name))
  ];
}
function currentChannel(){
  return allChannels().find(c => c.id === state.activeChannel.id) || state.activeChannel;
}
function isCurrentLocked(){
  const c = currentChannel();
  return c.isPasswordProtected && !state.unlocked[c.id];
}

function getUsernameHue(name){
  let h=0; const n = name || 'anonymous';
  for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))&0xffff;
  return [160,180,200,260,290,320,340][h%7];
}
function formatDateLabel(ts){
  const d=new Date(ts), t=new Date();
  if(d.toDateString()===t.toDateString()) return 'Today';
  const y=new Date(t); y.setDate(t.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'});
}
const formatTime = (ts) => new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

function isImageUrl(url){
  if(typeof url!=='string') return false;
  const u=url.trim().toLowerCase();
  return u.endsWith('.gif')||u.endsWith('.png')||u.endsWith('.jpg')||u.endsWith('.jpeg')||u.endsWith('.webp')||
    u.startsWith('data:image/')||
    (u.startsWith('http') && (u.includes('media.giphy.com')||u.includes('tenor.com/view')||u.includes('media.tenor.com')));
}
function getLocalMessages(id){ return safeParse(`local_messages_${id}`, []); }

let toastTimer=null;
function toast(msg){
  $('toast-text').textContent = msg;
  $('toast').classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=> $('toast').classList.add('hidden'), 2800);
}
function refreshIcons(){ if(window.lucide) lucide.createIcons(); }

/* ============================================================
   THEME
   ============================================================ */
function applyTheme(key){
  const t = THEMES[key] || THEMES.midnight;
  const root = document.documentElement;
  Object.entries(t.vars).forEach(([k,v]) => root.style.setProperty(k, v));
  root.style.setProperty('--accent-soft', `color-mix(in srgb, ${t.vars['--accent']} 16%, transparent)`);
  root.style.setProperty('--accent-glow', `color-mix(in srgb, ${t.vars['--accent']} 22%, transparent)`);
  root.setAttribute('data-scheme', t.scheme);
  state.theme = key;
  localStorage.setItem('chat_theme', key);
  renderThemePickers();
}

function renderThemePickers(){
  const dots = THEME_ORDER.map(key => {
    const t = THEMES[key];
    const active = state.theme===key;
    return `<button data-theme="${key}" title="${t.label} Theme"
      class="theme-dot w-6 h-6 rounded-full shrink-0 transition-all ${active?'ring-2 ring-white scale-110':'hover:scale-110 opacity-80 hover:opacity-100'}"
      style="background:linear-gradient(135deg, ${t.swatch[0]}, ${t.swatch[1]}); border:1px solid rgba(255,255,255,.15)"></button>`;
  }).join('');
  $('theme-dots').innerHTML = dots;

  const grid = THEME_ORDER.map(key => {
    const t = THEMES[key];
    const active = state.theme===key;
    return `<button data-theme="${key}"
      class="theme-swatch group relative rounded-xl p-3 h-20 flex flex-col justify-end text-left border transition-all cursor-pointer ${active?'ring-2 ring-offset-1':''}"
      style="background:linear-gradient(135deg, ${t.swatch[0]}, ${t.swatch[1]}); border-color:rgba(255,255,255,.10); ${active?`--tw-ring-color:${t.accent}; ring-offset-color:var(--bg);`:''}">
      <span class="text-[11px] font-black tracking-tight" style="color:${t.accent}">${t.label}</span>
      ${active?`<span class="absolute top-2 right-2 w-4 h-4 rounded-full flex items-center justify-center" style="background:${t.accent}"><i data-lucide="check" class="w-2.5 h-2.5" style="color:#000"></i></span>`:''}
    </button>`;
  }).join('');
  $('theme-grid').innerHTML = grid;

  document.querySelectorAll('.theme-dot,.theme-swatch').forEach(el=>{
    el.addEventListener('click', ()=> applyTheme(el.dataset.theme));
  });
  refreshIcons();
}

/* ============================================================
   RENDER: channels
   ============================================================ */
function channelIcon(ch, locked){
  if(ch.id==='general') return 'message-square';
  if(ch.id==='gaming')  return 'gamepad-2';
  if(ch.id==='cinema')  return 'film';
  if(ch.id==='memes')   return 'laugh';
  if(ch.isPasswordProtected) return locked?'lock':'unlock';
  return 'hash';
}

function renderChannels(){
  const rail = $('channel-rail');
  const cur = currentChannel();
  rail.innerHTML = allChannels().map(ch => {
    const active = cur.id===ch.id;
    const locked = ch.isPasswordProtected && !state.unlocked[ch.id];
    return `<button data-chan="${ch.id}"
      class="chan-btn w-9 h-9 flex items-center justify-center rounded-xl transition-all relative group cursor-pointer shrink-0 ${active?'accent border accent-bd':'txt-mute hover:txt hover:bg-white/5'}"
      style="${active?'background:var(--accent-soft)':''}"
      title="${esc(ch.name)} — ${esc(ch.description)}">
      <i data-lucide="${channelIcon(ch,locked)}" class="w-4 h-4 shrink-0"></i>
      <span class="absolute left-11 top-1/2 -translate-y-1/2 surface border bd2 text-[9px] txt font-semibold rounded px-2 py-1 shadow-lg whitespace-nowrap hidden group-hover:block z-50">
        <span class="font-extrabold uppercase accent">#${esc(ch.name)}</span>
        ${ch.isPasswordProtected?'<span class="text-[7px] text-amber-500 font-bold ml-1">(Protected)</span>':''}
        <span class="block text-[8px] txt-mute font-normal max-w-[160px] truncate">${esc(ch.description)}</span>
      </span>
    </button>`;
  }).join('');

  rail.querySelectorAll('.chan-btn').forEach(b=>{
    b.addEventListener('click', ()=> switchChannel(b.dataset.chan));
  });

  const sel = $('channel-select');
  sel.innerHTML = allChannels().map(c=>{
    const locked = c.isPasswordProtected && !state.unlocked[c.id];
    return `<option value="${c.id}" ${cur.id===c.id?'selected':''}>${locked?'🔒 ':''}#${esc(c.name)}</option>`;
  }).join('') + `<option value="__add__">+ CREATE</option>`;

  refreshIcons();
}

function renderHeader(){
  const c = currentChannel();
  $('active-channel-name').innerHTML =
    (c.isPasswordProtected?'<i data-lucide="lock" class="w-3 h-3 text-amber-500 shrink-0"></i>':'') + `<span>${esc(c.name)}</span>`;
  refreshIcons();
}

/* ============================================================
   RENDER: messages
   ============================================================ */
function displayedMessages(){
  const q = state.searchFilter.trim().toLowerCase();
  if(!q) return state.messages;
  return state.messages.filter(m =>
    (m.name||'').toLowerCase().includes(q) || (m.text||'').toLowerCase().includes(q));
}

function renderMessages(){
  const panel = $('messages-panel');
  const gate = $('unlock-gate');
  const composer = $('composer');

  if(isCurrentLocked()){
    const c = currentChannel();
    panel.classList.add('hidden');
    composer.classList.add('hidden');
    gate.classList.remove('hidden'); gate.classList.add('flex');
    $('gate-name').textContent = '#'+c.name;
    $('gate-desc').textContent = c.description || 'This channel is password protected. Enter the passcode to join.';
    refreshIcons();
    return;
  }
  gate.classList.add('hidden'); gate.classList.remove('flex');
  panel.classList.remove('hidden');
  composer.classList.remove('hidden');

  const msgs = displayedMessages();
  if(msgs.length===0){
    panel.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-center p-4 txt-mute">
      <div class="text-2xl animate-bounce mb-2">💬</div>
      <h3 class="text-[11px] font-bold uppercase tracking-wider txt-dim">${state.searchFilter?'No matches':'Beginning of Chat'}</h3>
    </div>`;
    return;
  }

  let html='', prevDate=null;
  msgs.forEach(m=>{
    const label = formatDateLabel(m.timestamp||Date.now());
    if(label!==prevDate){
      html += `<div class="flex items-center gap-2 py-1 select-none">
        <div class="flex-1 h-px bg-white/5"></div>
        <span class="text-[8px] font-bold font-mono txt-mute uppercase tracking-wider">${label}</span>
        <div class="flex-1 h-px bg-white/5"></div></div>`;
      prevDate=label;
    }
    const img = m.imageUrl || (isImageUrl(m.text)?m.text:null);
    html += `<div class="flex flex-col gap-0.5 hover:bg-white/[0.02] px-1 rounded transition-all group">
      <div class="flex items-baseline gap-1.5">
        <span class="text-[11px] font-extrabold font-mono tracking-tight" style="color:hsl(${getUsernameHue(m.name)},75%,var(--u-l,65%))">${esc(m.name||'anonymous')}</span>
        <span class="text-[8px] txt-mute font-mono">${formatTime(m.timestamp||Date.now())}</span>
      </div>
      ${m.text && !isImageUrl(m.text) ? `<div class="msg-text text-[12px] leading-normal break-words pl-0.5" style="color:var(--text)">${esc(m.text)}</div>`:''}
      ${img?`<div class="mt-1 rounded-lg overflow-hidden max-w-[240px] border bd2 shadow-sm bg-black/30">
        <img src="${esc(img)}" alt="Shared media" class="w-full h-auto max-h-[160px] object-contain hover:scale-105 transition-all duration-300" referrerpolicy="no-referrer" onerror="this.style.display='none'" />
      </div>`:''}
    </div>`;
  });
  panel.innerHTML = html;
  panel.scrollTop = panel.scrollHeight;
}

/* ============================================================
   CHANNEL SUBSCRIPTION
   ============================================================ */
function subscribeChannel(){
  if(state.listenerRef){ try{ state.listenerRef.off(); }catch(e){} state.listenerRef=null; }
  state.messages = [];

  const c = currentChannel();
  renderHeader(); renderChannels();

  if(isCurrentLocked()){ renderMessages(); return; }

  state.messages = getLocalMessages(c.id);
  renderMessages();

  const q = db.ref(c.refPath).limitToLast(100);
  state.listenerRef = q;
  q.on('child_added', (snap)=>{
    const data = snap.val(); if(!data) return;
    if(state.messages.some(m=>m.key===snap.key)) return;
    state.messages = state.messages.filter(m => !(m.isLocalTemp && m.text===data.text && m.name===data.name));
    state.messages.push({...data, key:snap.key});
    renderMessages();
  }, (err)=> console.warn('Firebase read error:', err));
}

function switchChannel(id){
  const target = allChannels().find(c=>c.id===id);
  if(!target) return;
  state.activeChannel = target;
  state.searchFilter=''; $('filter-input').value='';
  subscribeChannel();
}

/* ============================================================
   CUSTOM CHANNELS SYNC
   ============================================================ */
db.ref('custom_channels').on('value', (snap)=>{
  const val = snap.val();
  if(val){
    state.customChannels = Object.keys(val).map(key=>({
      id:key,
      name: val[key].name || 'custom-room',
      description: val[key].description || 'Custom chat room',
      refPath: `custom_messages_${key}`,
      isPasswordProtected: !!val[key].password,
      password: val[key].password || ''
    }));
  } else state.customChannels=[];
  renderChannels();
}, (err)=> console.warn('custom_channels read error (local fallback ok):', err));

/* ============================================================
   SEND MESSAGE
   ============================================================ */
function setSendState(){
  const btn = $('send-btn');
  const hasName = state.chatName.trim();
  const hasContent = $('compose-input').value.trim() || state.mediaUrl;
  const form = $('compose-form');
  const input = $('compose-input');

  input.disabled = !hasName;
  input.placeholder = hasName ? 'Write message…' : '⚠️ Set nickname';
  form.classList.toggle('opacity-40', !hasName);

  if(hasName && hasContent){
    btn.className = "p-2 rounded-lg transition-all flex items-center justify-center shrink-0 accent-bg hover:scale-105 active:scale-95 cursor-pointer font-bold";
  } else {
    btn.className = "p-2 rounded-lg transition-all flex items-center justify-center shrink-0 bg-neutral-700 text-neutral-400";
  }
}

function sendMessage(){
  if(!state.chatName.trim()){
    const form=$('compose-form');
    form.classList.add('animate-shake');
    $('name-wrap').classList.add('!border-rose-500');
    ($('nickname-desktop')||{}).focus && $('nickname-desktop').focus();
    toast('Please enter a nickname to chat!');
    setTimeout(()=>{ form.classList.remove('animate-shake'); $('name-wrap').classList.remove('!border-rose-500'); },900);
    return;
  }
  const text = $('compose-input').value.trim();
  if(!text && !state.mediaUrl) return;
  if(text && isBlocked(text)){ toast('⚠️ That message contains blocked words.'); return; }

  const ts=Date.now();
  const c = currentChannel();
  const msgData = { name:state.chatName.trim(), text: text || 'Sent a GIF/Image', imageUrl: state.mediaUrl||null, timestamp:ts, isLocalTemp:true, key:`local_${ts}_${Math.random()}` };

  const locals = getLocalMessages(c.id);
  localStorage.setItem(`local_messages_${c.id}`, JSON.stringify([...locals, msgData].slice(-100)));

  if(!state.messages.some(m=>m.text===msgData.text && m.timestamp===ts && m.name===msgData.name)){
    state.messages.push(msgData); renderMessages();
  }

  db.ref(c.refPath).push({ name:msgData.name, text:msgData.text, imageUrl:state.mediaUrl||null, timestamp:ts })
    .catch(err=> console.warn('Firebase send failed (local kept):', err));

  clearMedia();
  $('compose-input').value='';
  setSendState();
  $('compose-input').focus();
}

/* ============================================================
   MEDIA / GIF
   ============================================================ */
function setMedia(url){
  state.mediaUrl = url;
  if(url){
    $('media-preview').classList.remove('hidden'); $('media-preview').classList.add('flex');
    $('media-preview-img').src = url;
    $('media-preview-url').textContent = url;
  } else clearMedia();
  setSendState();
}
function clearMedia(){
  state.mediaUrl='';
  $('media-preview').classList.add('hidden'); $('media-preview').classList.remove('flex');
}

function renderGifTags(){
  $('gif-tags').innerHTML = GIF_TAGS.map(t=>
    `<button data-tag="${t}" class="gif-tag text-[9px] px-2 py-0.5 rounded-full bg-white/5 txt-dim hover:accent hover:bg-white/10 transition-all cursor-pointer">${t}</button>`
  ).join('');
  $('gif-tags').querySelectorAll('.gif-tag').forEach(b=>{
    b.addEventListener('click', ()=>{ $('gif-search-input').value = b.dataset.tag==='trending'?'':b.dataset.tag; searchGifs(b.dataset.tag); });
  });
}

function renderGifResults(items){
  const grid=$('gif-results');
  grid.innerHTML = items.map(g=>
    `<button data-url="${esc(g.url)}" class="gif-item group relative h-14 rounded overflow-hidden bg-black/40 border bd hover:accent-bd active:scale-95 transition-all cursor-pointer" title="${esc(g.name||'gif')}">
      <img src="${esc(g.preview||g.url)}" alt="${esc(g.name||'gif')}" class="w-full h-full object-cover" referrerpolicy="no-referrer" loading="lazy"/>
    </button>`
  ).join('');
  grid.querySelectorAll('.gif-item').forEach(b=>{
    b.addEventListener('click', ()=>{ setMedia(b.dataset.url); closeGif(); });
  });
}

async function searchGifs(term){
  const status=$('gif-status');
  const q = (term && term!=='trending') ? term.trim() : '';
  status.classList.remove('hidden');
  status.textContent = 'Loading…';
  try{
    const endpoint = q
      ? `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(q)}&limit=24&rating=pg-13&bundle=fixed_height`
      : `https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=24&rating=pg-13&bundle=fixed_height`;
    const res = await fetch(endpoint);
    if(!res.ok) throw new Error('Giphy HTTP '+res.status);
    const json = await res.json();
    const items = (json.data||[]).map(g=>({
      name: g.title,
      url: (g.images.original||{}).url || (g.images.downsized||{}).url,
      preview: (g.images.fixed_height_small||g.images.fixed_height||g.images.downsized||{}).url
    })).filter(g=>g.url);
    if(items.length){ renderGifResults(items); status.classList.add('hidden'); }
    else { renderGifResults(PRESET_GIFS); status.textContent='No results — showing presets.'; }
  }catch(err){
    console.warn('Giphy search failed, using presets:', err);
    renderGifResults(PRESET_GIFS);
    status.textContent='Search unavailable — showing preset memes.';
  }
}

function openGif(){
  state.gifOpen=true;
  $('gif-panel').classList.remove('hidden');
  $('gif-toggle').classList.add('accent-bg');
  $('gif-toggle').classList.remove('bg-white/5','txt-dim');
  if(!$('gif-results').children.length) searchGifs('trending');
  $('gif-search-input').focus();
}
function closeGif(){
  state.gifOpen=false;
  $('gif-panel').classList.add('hidden');
  $('gif-toggle').classList.remove('accent-bg');
  $('gif-toggle').classList.add('bg-white/5','txt-dim');
}

/* ============================================================
   EMOJI
   ============================================================ */
const EMOJIS = ['🔥','💀','💯','😂','👑','😮','🎮','🍿'];
function renderEmoji(){
  $('emoji-row').innerHTML = EMOJIS.map(e=>
    `<button data-emoji="${e}" class="emoji-btn hover:scale-125 rounded p-0.5 text-sm transition-all active:scale-95 cursor-pointer">${e}</button>`
  ).join('');
  $('emoji-row').querySelectorAll('.emoji-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      if(!state.chatName.trim()){ toast('Set name first!'); ($('nickname-desktop')||{}).focus&&$('nickname-desktop').focus(); return; }
      const inp=$('compose-input'); inp.value += b.dataset.emoji; setSendState(); inp.focus();

/* ============================================================
   CREATE CHANNEL
   ============================================================ */
function createChannel(e){
  if(e) e.preventDefault();
  const raw = $('new-chan-name').value.trim();
  if(!raw){ toast('Channel name is required!'); return; }
  const clean = raw.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-_]/g,'');
  if(!clean){ toast('Invalid channel name.'); return; }
  if(allChannels().some(c=>c.name.toLowerCase()===clean)){ toast('Channel name already exists!'); return; }

  const ref = db.ref('custom_channels').push();
  const id = ref.key || `local_chan_${Date.now()}_${Math.random().toString(36).substr(2,9)}`;
  const pass = $('new-chan-pass').value.trim();
  const desc = $('new-chan-desc').value.trim() || 'A custom chat room';

  const obj = { id, name:clean, description:desc, refPath:`custom_messages_${id}`, isPasswordProtected:!!pass, password:pass };
  state.localChannels = [...state.localChannels, obj];
  localStorage.setItem('local_custom_channels', JSON.stringify(state.localChannels));

  if(pass){ state.unlocked[id]=true; localStorage.setItem('unlocked_chat_channels', JSON.stringify(state.unlocked)); }

  state.activeChannel = obj;
  $('new-chan-name').value=''; $('new-chan-desc').value=''; $('new-chan-pass').value='';
  $('create-modal').classList.add('hidden');
  toast(`Channel #${clean} created!`);
  subscribeChannel();

  ref.set({ name:clean, description:desc, password:pass||null }).catch(err=> console.warn('channel sync failed:', err));
}

/* ============================================================
   UNLOCK
   ============================================================ */
function unlockChannel(e){
  if(e) e.preventDefault();
  const c = currentChannel();
  if($('unlock-input').value === c.password){
    state.unlocked[c.id]=true;
    localStorage.setItem('unlocked_chat_channels', JSON.stringify(state.unlocked));
    $('unlock-input').value='';
    toast('🔓 Channel unlocked!');
    subscribeChannel();
  } else toast('❌ Incorrect passcode!');
}

/* ============================================================
   WIRE UP EVENTS
   ============================================================ */
function bindNick(inp){
  if(!inp) return;
  inp.value = state.chatName;
  inp.addEventListener('input', ()=>{
    state.chatName = inp.value;
    localStorage.setItem('chat_name', inp.value);
    ['nickname-desktop','nickname-mobile'].forEach(id=>{ const el=$(id); if(el&&el!==inp) el.value=inp.value; });
    setSendState();
  });
}

function init(){
  applyTheme(state.theme);
  renderEmoji();
  renderGifTags();
  renderBlockedWordsList();
  bindNick($('nickname-desktop'));
  bindNick($('nickname-mobile'));
  setSendState();
  subscribeChannel();

  // header controls
  $('filter-input').addEventListener('input', (e)=>{ state.searchFilter=e.target.value; renderMessages(); });
  $('channel-select').addEventListener('change', (e)=>{
    if(e.target.value==='__add__'){ $('create-modal').classList.remove('hidden'); refreshIcons(); return; }
    switchChannel(e.target.value);
  });

  // compose
  $('compose-form').addEventListener('submit', (e)=>{ e.preventDefault(); sendMessage(); });
  $('compose-input').addEventListener('input', setSendState);
  $('compose-input').addEventListener('keydown', (e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }});

  // media
  $('media-clear').addEventListener('click', clearMedia);

  // gif panel
  $('gif-toggle').addEventListener('click', ()=> state.gifOpen?closeGif():openGif());
  $('gif-close').addEventListener('click', closeGif);
  $('gif-search-form').addEventListener('submit', (e)=>{ e.preventDefault(); searchGifs($('gif-search-input').value); });
  $('gif-url-apply').addEventListener('click', ()=>{
    const v=$('gif-url-input').value.trim(); if(v){ setMedia(v); $('gif-url-input').value=''; closeGif(); }
  });

  // create modal
  $('add-channel-rail').addEventListener('click', ()=>{ $('create-modal').classList.remove('hidden'); refreshIcons(); });
  $('create-close').addEventListener('click', ()=> $('create-modal').classList.add('hidden'));
  $('create-cancel').addEventListener('click', ()=> $('create-modal').classList.add('hidden'));
  $('create-form').addEventListener('submit', createChannel);

  // unlock
  $('unlock-form').addEventListener('submit', unlockChannel);

  // moderation modal
  $('moderation-trigger').addEventListener('click', ()=>{ $('moderation-modal').classList.remove('hidden'); renderBlockedWordsList(); refreshIcons(); });
  $('moderation-close').addEventListener('click', ()=> $('moderation-modal').classList.add('hidden'));
  $('add-blocked-word-form').addEventListener('submit', (e)=>{ e.preventDefault(); const w=$('new-blocked-word').value; if(addBlockedWord(w)) $('new-blocked-word').value=''; });

  // theme modal
  $('theme-trigger').addEventListener('click', ()=>{ $('theme-modal').classList.remove('hidden'); refreshIcons(); });
  $('theme-trigger-mobile').addEventListener('click', ()=>{ $('theme-modal').classList.remove('hidden'); refreshIcons(); });
  $('theme-close').addEventListener('click', ()=> $('theme-modal').classList.add('hidden'));

  // close modals on backdrop click
  ['create-modal','theme-modal','moderation-modal'].forEach(id=>{
    $(id).addEventListener('click', (e)=>{ if(e.target.id===id) $(id).classList.add('hidden'); });
  });

  refreshIcons();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
